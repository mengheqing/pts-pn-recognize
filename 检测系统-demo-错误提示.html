<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>检测系统</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-gradient-start: #e0f2fe;
      --bg-gradient-end: #f8fafc;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --gray: #64748b;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(145deg, #e0f2fe 0%, #f1f5f9 40%, #f8fafc 100%);
      color: #0f172a;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

    h1, h2 {
      margin: 0;
      text-align: center;
      color: #0f172a;
    }

    h1 { font-size:32px; line-height:42px; font-weight:780; letter-spacing:1px; }
    h2 { font-size:24px; line-height:32px; font-weight:720; margin-bottom:4px; }

    /* 首页 */
    .home-page { justify-content:center; gap:28px; }

    .home-info {
      display:grid; grid-template-columns:max-content minmax(0,1fr); gap:12px;
      padding:18px; border-radius:28px;
      background:rgba(255,255,255,0.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.5); box-shadow:var(--shadow-lg);
    }

    .info-cell {
      min-height:62px; padding:12px 14px; border-radius:18px;
      display:flex; align-items:center; justify-content:center; text-align:center;
      font-size:14px; line-height:20px; word-break:break-word;
    }

    .info-label {
      min-width:92px; color:#1e40af; font-weight:700;
      background:rgba(219,234,254,0.8); border:1px solid rgba(96,165,250,0.4);
      box-shadow:var(--shadow-sm);
    }

    .info-value {
      color:#0f172a; font-weight:650;
      background:rgba(255,255,255,0.85); border:1px solid rgba(203,213,225,0.6);
      box-shadow:var(--shadow-sm);
    }

    .location-lines { display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; }

    .home-buttons { display:flex; flex-direction:column; gap:14px; }

    button {
      height:50px; border:none; border-radius:20px; color:#ffffff;
      font-size:16px; font-weight:650; cursor:pointer;
      background:var(--primary); box-shadow:0 8px 20px rgba(37,99,235,0.25);
      transition:all 0.2s ease;
    }

    button:active { transform:scale(0.97); opacity:0.9; box-shadow:0 4px 12px rgba(37,99,235,0.18); }
    button:disabled { cursor:not-allowed; opacity:0.55; transform:none; }

    button.green { background:var(--success); box-shadow:0 8px 20px rgba(22,163,74,0.2); }
    button.green:active { box-shadow:0 4px 12px rgba(22,163,74,0.15); }

    button.gray { background:var(--gray); box-shadow:0 8px 20px rgba(100,116,139,0.2); }
    button.gray:active { box-shadow:0 4px 12px rgba(100,116,139,0.15); }

    button.danger { background:var(--danger); box-shadow:0 8px 20px rgba(220,38,38,0.2); }
    button.danger:active { box-shadow:0 4px 12px rgba(220,38,38,0.15); }

    /* 检测页 */
    .detect-page { gap:14px; }

    .tip {
      margin:0; padding:14px 16px; font-size:13px; line-height:21px;
      color:#92400e; background:rgba(255,251,235,0.9); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(251,191,36,0.4); border-radius:20px; text-align:center; box-shadow:var(--shadow-sm);
    }

    .section-title { margin:0; font-size:15px; font-weight:700; color:#0f172a; }

    .preview-box {
      width:100%; flex:1; min-height:0; border:none; border-radius:28px; overflow:hidden;
      background:rgba(255,255,255,0.5); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-md);
    }

    .preview-frame {
      width:100%; height:100%; aspect-ratio:3/4; background:transparent;
      display:flex; align-items:center; justify-content:center; border-radius:28px; overflow:hidden;
    }

    #preview { width:100%; height:100%; object-fit:contain; display:none; background:#000; }
    .empty-text { color:#64748b; font-size:15px; }
    canvas { display:none; }

    .buttons { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .buttons .wide { grid-column:1/-1; }
    .buttons button, .camera-actions button { height:48px; font-size:15px; }

    #result {
      height:96px; padding:14px; font-size:14px; line-height:22px; color:#1e3a8a;
      background:rgba(255,255,255,0.8); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(147,197,253,0.5); border-radius:20px; overflow-y:auto;
      white-space:pre-wrap; box-shadow:var(--shadow-sm);
    }

    /* 全局权限引导浮层 */
    .permission-overlay {
      position:fixed; inset:0; z-index:1000;
      display:none; align-items:center; justify-content:center;
      padding:calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      background:rgba(15,23,42,0.55); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    }

    .permission-overlay.show { display:flex; }

    .permission-dialog {
      width:100%; max-width:380px;
      background:rgba(255,255,255,0.92); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
      border-radius:32px; padding:20px; border:1px solid rgba(255,255,255,0.6);
      box-shadow:0 30px 80px rgba(15,23,42,0.35);
    }

    .permission-dialog-title {
      margin:0 0 16px; font-size:20px; font-weight:700; color:#b91c1c; text-align:center;
    }

    .permission-dialog-body {
      margin:0 0 16px; font-size:14px; line-height:1.6; color:#1e293b;
      white-space:pre-wrap; text-align:left;
    }

    .permission-dialog-body ul {
      margin:8px 0 0; padding-left:20px; list-style-type:disc;
    }

    .permission-dialog-actions {
      display:grid; grid-template-columns:1fr 1fr; gap:10px;
    }

    .permission-dialog-actions button {
      height:44px; font-size:14px;
    }

    .permission-dialog-actions button.retry {
      background:var(--danger); box-shadow:0 8px 20px rgba(220,38,38,0.2);
    }

    .permission-dialog-actions button.dismiss {
      background:var(--gray); box-shadow:0 8px 20px rgba(100,116,139,0.2);
    }

    /* 相机模态 */
    .camera-modal {
      position:fixed; inset:0; z-index:999;
      display:none; align-items:center; justify-content:center;
      padding:calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      background:rgba(15,23,42,0.55); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    }

    .camera-modal.show { display:flex; }

    .camera-panel {
      width:100%; max-width:390px;
      background:rgba(255,255,255,0.92); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
      border-radius:32px; overflow:hidden; padding:20px;
      border:1px solid rgba(255,255,255,0.6); box-shadow:0 30px 80px rgba(15,23,42,0.35);
    }

    .camera-title { margin:0 0 16px; color:#0f172a; font-size:20px; font-weight:700; text-align:center; }

    .camera-view-wrap { width:100%; display:flex; justify-content:center; }
    .camera-view { width:min(100%,340px); aspect-ratio:3/4; background:#000; border-radius:24px; overflow:hidden; border:1px solid rgba(148,163,184,0.5); box-shadow:var(--shadow-md); }
    #video { width:100%; height:100%; object-fit:cover; display:block; }

    .camera-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }

    /* 历史页 */
    .history-page { gap:18px; }

    .history-list {
      flex:1; margin:0; padding:0; overflow-y:auto; list-style:none;
      display:flex; flex-direction:column; gap:12px;
    }

    .history-item, .blank-box {
      border:1px solid rgba(148,163,184,0.4); border-radius:24px; color:#334155;
      background:rgba(255,255,255,0.75); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow-sm);
    }

    .history-item { padding:14px; font-size:13px; line-height:20px; color:#1e293b; white-space:pre-wrap; word-break:break-word; }
    .blank-box { flex:1; display:flex; align-items:center; justify-content:center; font-size:15px; color:#64748b; }

    @media screen and (max-height:760px) {
      .page { padding-top:calc(12px + env(safe-area-inset-top)); padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
      .tip { display:none; }
      .preview-box { min-height:0; }
      .camera-view { width:min(100%,280px); }
      #result { height:78px; }
      button { height:42px; font-size:14px; }
      .buttons button, .camera-actions button { height:42px; }
    }
  </style>
</head>

<body>
  <div class="page home-page active" id="homePage">
    <h1>检测系统</h1>

    <div class="home-info">
      <div class="info-cell info-label">当前时间</div>
      <div class="info-cell info-value" id="currentTime">获取中...</div>

      <div class="info-cell info-label">当前位置</div>
      <div class="info-cell info-value">
        <div class="location-lines">
          <div id="currentLatitude">纬度：正在获取...</div>
          <div id="currentLongitude">经度：正在获取...</div>
        </div>
      </div>

      <div class="info-cell info-label">所在城市</div>
      <div class="info-cell info-value" id="currentCity">正在获取城市...</div>
    </div>

    <div class="home-buttons">
      <button class="green" type="button" data-action="show-page" data-page="detectPage">开始检测</button>
      <button type="button" data-action="show-page" data-page="historyPage">检测历史</button>
      <button class="danger" type="button" data-action="exit">退出程序</button>
    </div>
  </div>

  <div class="page detect-page" id="detectPage">
    <h2>拍照识别</h2>

    <p class="tip">
      点击“拍照”后打开摄像头窗口开始拍照<br>
      拍摄后点击“上传并识别”开始归类。
    </p>

    <p class="section-title">照片预览</p>

    <div class="preview-box">
      <div class="preview-frame">
        <span class="empty-text" id="emptyText">暂无照片</span>
        <img id="preview" alt="照片预览" />
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="buttons">
      <button type="button" data-action="open-camera">拍照</button>
      <button class="gray" type="button" data-action="reset-photo">重拍</button>
      <button class="green" type="button" data-action="save-photo">保存到本地</button>
      <button class="green" type="button" data-action="upload-photo">上传并识别</button>
      <button class="danger wide" type="button" data-action="show-page" data-page="homePage">返回首页</button>
    </div>

    <p class="section-title">识别结果</p>
    <div id="result">暂无结果</div>
  </div>

  <div class="page history-page" id="historyPage">
    <h2>检测历史</h2>

    <ul class="history-list" id="historyList"></ul>
    <div class="blank-box" id="historyEmpty">检测历史页面待编辑</div>

    <button type="button" data-action="show-page" data-page="homePage">返回首页</button>
  </div>

  <div class="camera-modal" id="cameraModal" aria-hidden="true">
    <div class="camera-panel">
      <p class="camera-title">请拍摄照片</p>
      <div class="camera-view-wrap">
        <div class="camera-view">
          <video id="video" autoplay playsinline></video>
        </div>
      </div>
      <div class="camera-actions">
        <button type="button" data-action="capture-photo">确认拍摄</button>
        <button class="danger" type="button" data-action="close-camera">取消</button>
      </div>
    </div>
  </div>

  <!-- 全局权限引导浮层 -->
  <div class="permission-overlay" id="globalPermissionOverlay">
    <div class="permission-dialog">
      <p class="permission-dialog-title" id="permissionTitle">权限被拒绝</p>
      <div class="permission-dialog-body" id="permissionBody"></div>
      <div class="permission-dialog-actions">
        <button class="retry" type="button" data-action="retry-permission">重新授权</button>
        <button class="dismiss" type="button" data-action="close-permission-guide">知道了</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const CONFIG = {
        apiEndpoint: "https://你的服务器地址/predict",
        historyKey: "detectHistory",
        maxHistoryItems: 20,
        cameraRatio: 3 / 4,
        jpegQuality: 0.95,
        localFilePrefix: "photo+"
      };

      const elements = {
        pages: document.querySelectorAll(".page"),
        video: document.getElementById("video"),
        canvas: document.getElementById("canvas"),
        preview: document.getElementById("preview"),
        emptyText: document.getElementById("emptyText"),
        resultBox: document.getElementById("result"),
        cameraModal: document.getElementById("cameraModal"),
        currentTime: document.getElementById("currentTime"),
        currentLatitude: document.getElementById("currentLatitude"),
        currentLongitude: document.getElementById("currentLongitude"),
        currentCity: document.getElementById("currentCity"),
        historyList: document.getElementById("historyList"),
        historyEmpty: document.getElementById("historyEmpty"),
        globalOverlay: document.getElementById("globalPermissionOverlay"),
        permissionTitle: document.getElementById("permissionTitle"),
        permissionBody: document.getElementById("permissionBody")
      };

      const state = {
        currentPageId: "homePage",
        stream: null,
        photoBlob: null,
        previewUrl: null,
        latitude: null,
        longitude: null,
        timeTimer: null,
        isCameraOpening: false,
        isUploading: false,
        permissionGuideType: null   // 'camera' 或 'location'
      };

      // ------ 页面切换 ------
      function showPage(pageId) {
        const nextPage = document.getElementById(pageId);
        if (!nextPage) {
          setResult("页面不存在：" + pageId);
          return;
        }
        closeCameraModal();
        closeGlobalPermissionGuide();

        elements.pages.forEach(p => p.classList.remove("active"));
        nextPage.classList.add("active");
        state.currentPageId = pageId;

        if (pageId === "historyPage") renderHistory();
      }

      function setResult(msg) { elements.resultBox.innerText = msg; }

      // ------ 全局权限引导 ------
      function closeGlobalPermissionGuide() {
        elements.globalOverlay.classList.remove("show");
        state.permissionGuideType = null;
      }

      function showPermissionGuide(type) {
        state.permissionGuideType = type;
        const isCamera = (type === "camera");
        const isHTTPS = window.location.protocol === "https:";

        let bodyHtml = "";

        if (isCamera) {
          elements.permissionTitle.innerText = "摄像头权限被拒绝";
          bodyHtml = "请检查以下事项以确保摄像头正常工作：\n";
          bodyHtml += "<ul>";
          bodyHtml += "<li>操作系统“设置 > 隐私 > 相机”中允许浏览器访问摄像头</li>";
          bodyHtml += "<li>浏览器站点权限：地址栏左侧锁图标 > 网站权限 > 摄像头设为“允许”</li>";
          if (!isHTTPS) {
            bodyHtml += "<li><strong>当前页面未使用 HTTPS</strong>，部分浏览器要求安全连接才能调用摄像头</li>";
          }
          bodyHtml += "<li>确认没有其他应用正在占用摄像头</li>";
          bodyHtml += "</ul>";
          bodyHtml += "\n完成设置后，请点击下方“重新授权”按钮重试。";
        } else {
          elements.permissionTitle.innerText = "定位权限被拒绝";
          bodyHtml = "请检查以下事项以确保获取位置：\n";
          bodyHtml += "<ul>";
          bodyHtml += "<li>操作系统“设置 > 隐私 > 位置”中允许浏览器获取位置</li>";
          bodyHtml += "<li>浏览器站点权限：地址栏左侧锁图标 > 网站权限 > 位置设为“允许”</li>";
          if (!isHTTPS) {
            bodyHtml += "<li><strong>当前页面未使用 HTTPS</strong>，部分浏览器要求安全连接才能获取位置</li>";
          }
          bodyHtml += "<li>确保设备定位服务已开启（GPS/Wi-Fi）</li>";
          bodyHtml += "</ul>";
          bodyHtml += "\n完成设置后，请点击下方“重新授权”按钮重试。";
        }

        elements.permissionBody.innerHTML = bodyHtml;
        elements.globalOverlay.classList.add("show");
      }

      // ------ 时间与定位 ------
      function updateTime() {
        elements.currentTime.innerText = new Date().toLocaleString("zh-CN", {
          year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit"
        });
      }

      function startClock() {
        updateTime();
        clearInterval(state.timeTimer);
        state.timeTimer = setInterval(updateTime, 1000);
      }

      function getCurrentLocation() {
        if (!navigator.geolocation) {
          elements.currentLatitude.innerText = "纬度：浏览器不支持";
          elements.currentLongitude.innerText = "经度：浏览器不支持";
          elements.currentCity.innerText = "无法获取城市";
          return;
        }

        elements.currentLatitude.innerText = "纬度：请求权限中...";
        elements.currentLongitude.innerText = "经度：请求权限中...";
        elements.currentCity.innerText = "等待定位成功...";

        navigator.geolocation.getCurrentPosition(
          handleLocationSuccess,
          handleLocationError,
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }

      async function handleLocationSuccess(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        state.latitude = lat;
        state.longitude = lng;

        elements.currentLatitude.innerText = "纬度：" + lat.toFixed(6);
        elements.currentLongitude.innerText = "经度：" + lng.toFixed(6);
        elements.currentCity.innerText = "正在解析城市...";

        try {
          elements.currentCity.innerText = await reverseGeocode(lat, lng);
        } catch (e) {
          console.error(e);
          elements.currentCity.innerText = "城市解析失败";
        }
      }

      function handleLocationError(error) {
        const messages = { 1:"权限被拒绝", 2:"无法获取", 3:"定位超时" };
        const msg = messages[error.code] || "定位失败";
        elements.currentLatitude.innerText = "纬度：" + msg;
        elements.currentLongitude.innerText = "经度：" + msg;
        elements.currentCity.innerText = "无法获取城市";

        if (error.code === 1) {
          showPermissionGuide("location");
        }
      }

      async function reverseGeocode(lat, lng) {
        const url = "https://nominatim.openstreetmap.org/reverse?format=json&lat=" +
          encodeURIComponent(lat) + "&lon=" + encodeURIComponent(lng) + "&accept-language=zh-CN";
        const res = await fetch(url);
        if (!res.ok) throw new Error("逆地理编码请求失败");
        const data = await res.json();
        const addr = data.address || {};
        return addr.city || addr.town || addr.village || addr.county || addr.state || "未知城市";
      }

      // ------ 摄像头 ------
      async function openCameraModal() {
        if (state.isCameraOpening) return;
        if (!navigator.mediaDevices?.getUserMedia) {
          setResult("当前浏览器不支持摄像头调用");
          return;
        }

        state.isCameraOpening = true;
        setResult("正在打开摄像头...");
        closeGlobalPermissionGuide();
        elements.cameraModal.classList.add("show");
        elements.cameraModal.setAttribute("aria-hidden","false");

        try {
          await startCamera();
          setResult("摄像头已打开，请确认拍摄");
        } catch (err) {
          closeCameraModal();
          handleCameraError(err);
        } finally {
          state.isCameraOpening = false;
        }
      }

      async function startCamera() {
        stopCamera();
        state.stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 3024 },
            height: { ideal: 4032 },
            aspectRatio: { ideal: CONFIG.cameraRatio }
          },
          audio: false
        });
        elements.video.srcObject = state.stream;
        await new Promise(resolve => { elements.video.onloadedmetadata = () => { elements.video.play(); resolve(); }; });
      }

      function capturePhoto() {
        if (!state.stream) return alert("摄像头未打开");
        const w = elements.video.videoWidth, h = elements.video.videoHeight;
        if (!w || !h) return alert("摄像头画面还没准备好");

        const crop = getCenteredCrop(w, h, CONFIG.cameraRatio);
        elements.canvas.width = crop.outputWidth;
        elements.canvas.height = crop.outputHeight;
        const ctx = elements.canvas.getContext("2d");
        ctx.drawImage(elements.video, crop.x, crop.y, crop.width, crop.height, 0, 0, crop.outputWidth, crop.outputHeight);
        elements.canvas.toBlob(blob => {
          if (!blob) { setResult("拍照失败，请重试"); return; }
          state.photoBlob = blob;
          updatePreview(blob);
          setResult("拍照成功\n照片比例：3:4\n照片尺寸：" + crop.outputWidth + " x " + crop.outputHeight);
          closeCameraModal();
        }, "image/jpeg", CONFIG.jpegQuality);
      }

      function getCenteredCrop(sw, sh, ratio) {
        let x=0, y=0, w=sw, h=sh;
        if (sw/sh > ratio) { w = sh*ratio; x = (sw-w)/2; }
        else if (sw/sh < ratio) { h = sw/ratio; y = (sh-h)/2; }
        return { x, y, width:w, height:h, outputWidth:Math.round(w), outputHeight:Math.round(h) };
      }

      function updatePreview(blob) {
        if (state.previewUrl) URL.revokeObjectURL(state.previewUrl);
        state.previewUrl = URL.createObjectURL(blob);
        elements.preview.src = state.previewUrl;
        elements.preview.style.display = "block";
        elements.emptyText.style.display = "none";
      }

      function closeCameraModal() {
        stopCamera();
        elements.cameraModal.classList.remove("show");
        elements.cameraModal.setAttribute("aria-hidden","true");
      }

      function stopCamera() {
        if (!state.stream) return;
        state.stream.getTracks().forEach(t => t.stop());
        elements.video.srcObject = null;
        state.stream = null;
      }

      function resetPhoto() {
        state.photoBlob = null;
        if (state.previewUrl) { URL.revokeObjectURL(state.previewUrl); state.previewUrl = null; }
        elements.preview.removeAttribute("src");
        elements.preview.style.display = "none";
        elements.emptyText.style.display = "inline";
        setResult("已清空照片，请重新拍照");
      }

      function savePhotoToLocal() {
        if (!state.photoBlob) return alert("请先拍照");
        const url = URL.createObjectURL(state.photoBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = createPhotoFileName();
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setResult("照片已保存，文件名：" + a.download);
      }

      function createPhotoFileName() {
        const now = new Date();
        const stamp = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
        return CONFIG.localFilePrefix + stamp + "+" + getCoordInt(state.longitude) + "+" + getCoordInt(state.latitude) + ".jpg";
      }

      function pad(n) { return String(n).padStart(2,"0"); }
      function getCoordInt(v) { return (typeof v === "number" && !Number.isNaN(v)) ? String(Math.trunc(v)) : "unknown"; }

      async function uploadPhoto() {
        if (!state.photoBlob) return alert("请先拍照");
        if (state.isUploading) return;
        state.isUploading = true;
        setResult("正在上传并识别...");

        const fd = new FormData();
        fd.append("file", state.photoBlob, "photo.jpg");
        try {
          const res = await fetch(CONFIG.apiEndpoint, { method:"POST", body:fd });
          if (!res.ok) throw new Error("服务器响应异常：" + res.status);
          const data = await res.json();
          setResult("识别结果：\n" + JSON.stringify(data, null, 2));
          saveHistory(data);
        } catch (err) {
          setResult("上传或识别失败：" + err.message);
        } finally {
          state.isUploading = false;
        }
      }

      function getHistory() {
        try { return JSON.parse(localStorage.getItem(CONFIG.historyKey) || "[]"); }
        catch (e) { return []; }
      }

      function saveHistory(data) {
        const arr = getHistory();
        arr.unshift({ time: new Date().toLocaleString("zh-CN"), result: data });
        localStorage.setItem(CONFIG.historyKey, JSON.stringify(arr.slice(0, CONFIG.maxHistoryItems)));
      }

      function renderHistory() {
        const arr = getHistory();
        elements.historyList.innerHTML = "";
        elements.historyEmpty.style.display = arr.length ? "none" : "flex";
        arr.forEach(item => {
          const li = document.createElement("li");
          li.className = "history-item";
          li.innerText = item.time + "\n" + JSON.stringify(item.result, null, 2);
          elements.historyList.appendChild(li);
        });
      }

      function handleCameraError(err) {
        console.error("摄像头错误：", err);
        if (err.name === "NotAllowedError") {
          setResult("摄像头权限被拒绝");
          showPermissionGuide("camera");
        } else if (err.name === "NotFoundError") {
          setResult("没有检测到摄像头设备");
        } else if (err.name === "NotReadableError") {
          setResult("摄像头可能被其他程序占用");
        } else {
          setResult("无法打开摄像头：" + err.message);
        }
      }

      // ------ 事件处理 ------
      function handleAction(e) {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;

        if (action === "show-page") showPage(btn.dataset.page);
        else if (action === "exit") { stopCamera(); window.close(); setTimeout(() => alert("请手动关闭标签页"), 300); }
        else if (action === "open-camera") openCameraModal();
        else if (action === "reset-photo") resetPhoto();
        else if (action === "save-photo") savePhotoToLocal();
        else if (action === "upload-photo") uploadPhoto();
        else if (action === "capture-photo") capturePhoto();
        else if (action === "close-camera") closeCameraModal();
        else if (action === "retry-permission") {
          closeGlobalPermissionGuide();
          if (state.permissionGuideType === "camera") {
            openCameraModal();
          } else if (state.permissionGuideType === "location") {
            getCurrentLocation();
          }
        } else if (action === "close-permission-guide") {
          closeGlobalPermissionGuide();
        }
      }

      function cleanup() {
        stopCamera();
        if (state.previewUrl) { URL.revokeObjectURL(state.previewUrl); state.previewUrl = null; }
        clearInterval(state.timeTimer);
      }

      function init() {
        document.addEventListener("click", handleAction);
        window.addEventListener("beforeunload", cleanup);
        document.addEventListener("visibilitychange", () => { if (document.hidden) closeCameraModal(); });
        startClock();
        getCurrentLocation();
        renderHistory();
      }

      init();
    })();
  </script>
</body>
</html>
